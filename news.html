  <script>
    const SITE_URL = 'https://www.chaincatcher.com/';
    const FEED_URL = 'https://www.chaincatcher.com/feed';
    const FEED_RSS_URL = 'https://www.chaincatcher.com/rss';
    const SOURCE_URLS = [SITE_URL, FEED_URL, FEED_RSS_URL];
    const FALLBACK_NEWS = [
      {
        title: '以太坊生态活跃度提升，链上资金持续流入',
        link: SITE_URL,
        summary: 'DeFi 与二层网络交易笔数上升，市场关注度回暖，短线波动或将加剧。',

      },
      {
        title: '比特币波动率回落，资金博弈进入新阶段',
        link: SITE_URL,
        summary: '衍生品市场多空比趋于均衡，关键阻力区附近成交放大，需关注突破方向。',
        thumbnail: 'https://images.unsplash.com/photo-1518546305927-5a555bb7020d?auto=format&fit=crop&w=1200&q=80'
      },
      {
        title: 'Solana 生态应用增长，资金关注度上升',
        link: SITE_URL,
        summary: '链上活跃地址持续增加，生态项目交易热度回升，市场风险偏好有所修复。',
        thumbnail: 'https://images.unsplash.com/photo-1639762681485-074b7f938ba0?auto=format&fit=crop&w=1200&q=80'
      }
    ];

    const BINANCE_TICKER_24H = 'https://api.binance.com/api/v3/ticker/24hr';

    const newsListEl = document.getElementById('newsList');
    const feedStatusEl = document.getElementById('feedStatus');
    const refreshBtn = document.getElementById('refreshBtn');
    const tradeModalEl = document.getElementById('tradeModal');
    const tradeBackdropEl = document.getElementById('tradeBackdrop');
    const tradeCloseBtnEl = document.getElementById('tradeCloseBtn');
    const tradePairEl = document.getElementById('tradePair');
    const tradeLastPriceEl = document.getElementById('tradeLastPrice');
    const tradeChangeBadgeEl = document.getElementById('tradeChangeBadge');
    const tradePriceInputEl = document.getElementById('tradePriceInput');
    const tradeAmountInputEl = document.getElementById('tradeAmountInput');
    const tradeAmountUnitEl = document.getElementById('tradeAmountUnit');
    const tradeFeeEl = document.getElementById('tradeFee');
    const tradeSubmitBtnEl = document.getElementById('tradeSubmitBtn');
    const tradeHintEl = document.getElementById('tradeHint');
    const tabBuyEl = document.getElementById('tabBuy');
    const tabSellEl = document.getElementById('tabSell');

    let marketMap = new Map();
    let marketStatus = {
      ok: false,
      message: '准备拉取 Binance 行情数据'
    };
    let currentTrade = {
      side: 'buy',
      symbol: 'BTC',
      price: '--',
      change: '--'
    };

    function htmlToText(html = '') {
      const div = document.createElement('div');
      div.innerHTML = html;
      return (div.textContent || '').replace(/\s+/g, ' ').trim();
    }

    function formatNumber(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return '--';
      if (Math.abs(num) >= 1e9) return `${(num / 1e9).toFixed(2)}B`;
      if (Math.abs(num) >= 1e6) return `${(num / 1e6).toFixed(2)}M`;
      if (Math.abs(num) >= 1e3) return `${(num / 1e3).toFixed(2)}K`;
      return num.toFixed(2);
    }

    function formatPercent(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return '--';
      return `${num >= 0 ? '+' : ''}${num.toFixed(2)}%`;
    }

    function formatPrice(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return '--';
      if (num >= 1000) return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (num >= 1) return num.toLocaleString('en-US', { minimumFractionDigits: 3, maximumFractionDigits: 4 });
      return num.toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 6 });
    }

    function toNumber(...values) {
      for (const value of values) {
        const n = Number(value);
        if (Number.isFinite(n)) return n;
      }
      return null;
    }

    function normalizeSymbol(raw = '') {
      return String(raw).toUpperCase().replace(/[^A-Z0-9]/g, '');
    }

    function baseSymbol(raw = '') {
      const clean = normalizeSymbol(raw);
      if (!clean) return '';
      return clean.replace(/(USDT|USD|USDC|PERP|SWAP)$/g, '') || clean;
    }

    function getThumbFromItem(item) {
      const mediaUrl = item.querySelector('media\\:content, content')?.getAttribute('url');
      const enclosureUrl = item.querySelector('enclosure')?.getAttribute('url');
      const desc = item.querySelector('description')?.textContent || '';
      const matchImg = desc.match(/<img[^>]+src=["']([^"']+)["']/i);
      return mediaUrl || enclosureUrl || (matchImg ? matchImg[1] : '') || 'https://images.unsplash.com/photo-1640340434855-6084b1f4901c?auto=format&fit=crop&w=1200&q=80';
    }

    function recommendCoin(text = '') {
      const content = text.toUpperCase();
      const rules = [
        { match: /(BITCOIN|BTC|比特币)/, symbol: 'BTC' },
        { match: /(ETHEREUM|ETH|以太坊)/, symbol: 'ETH' },
        { match: /(SOLANA|SOL)/, symbol: 'SOL' },
        { match: /(RIPPLE|XRP)/, symbol: 'XRP' },
        { match: /(DOGE|DOGECOIN)/, symbol: 'DOGE' },
        { match: /(BNB|BINANCE)/, symbol: 'BNB' },
        { match: /(AVALANCHE|AVAX)/, symbol: 'AVAX' },
        { match: /(ADA|CARDANO)/, symbol: 'ADA' },
        { match: /(LINK|CHAINLINK)/, symbol: 'LINK' }
      ];

      for (const rule of rules) {
        if (rule.match.test(content)) return rule.symbol;
      }

      const fallback = ['BTC', 'ETH', 'SOL', 'XRP', 'BNB', 'AVAX', 'ADA', 'LINK'];
      return fallback[Math.floor(Math.random() * fallback.length)];
    }

    function extractNewsFromFeed(xmlText, sourceUrl = SITE_URL) {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlText, 'application/xml');
      if (xmlDoc.querySelector('parsererror')) {
        throw new Error('RSS XML 解析失败');
      }

      const items = Array.from(xmlDoc.querySelectorAll('item')).slice(0, 12);
      return items.map((item, index) => {
        const title = (item.querySelector('title')?.textContent || '').trim();
        const link = (item.querySelector('link')?.textContent || '').trim();
        const rawDescription = item.querySelector('description')?.textContent || '';
        const summary = htmlToText(rawDescription);

        return {
          id: `${Date.now()}-${index}`,
          title: title || 'Untitled',
          link: link || sourceUrl,
          summary: summary || '暂无正文摘要。',
          thumbnail: getThumbFromItem(item),
          recommend: recommendCoin(`${title} ${summary}`)
        };
      });
    }

    function extractNewsFromHtml(htmlText, sourceUrl = SITE_URL) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, 'text/html');
      const anchors = Array.from(doc.querySelectorAll('a[href]'));
      const seen = new Set();
      const results = [];

      for (const a of anchors) {
        if (results.length >= 12) break;
        const href = a.getAttribute('href') || '';
        const title = (a.textContent || '').replace(/\s+/g, ' ').trim();

        if (!title || title.length < 10) continue;

        let fullLink = '';
        try {
          fullLink = new URL(href, sourceUrl).href;
        } catch (_) {
          continue;
        }
        if (!fullLink.includes('chaincatcher.com')) continue;
        if (seen.has(fullLink)) continue;

        const container = a.closest('article, li, div, section') || a.parentElement || a;
        const para = container.querySelector('p');
        const summary = ((para && para.textContent) || title).replace(/\s+/g, ' ').trim();
        const img = container.querySelector('img');
        const thumbnail = img?.getAttribute('src') || img?.getAttribute('data-src') || img?.getAttribute('data-original') || '';

        seen.add(fullLink);
        results.push({
          id: `${Date.now()}-html-${results.length}`,
          title,
          link: fullLink,
          summary: summary || '暂无正文摘要。',
          thumbnail: thumbnail || 'https://images.unsplash.com/photo-1640340434855-6084b1f4901c?auto=format&fit=crop&w=1200&q=80',
          recommend: recommendCoin(`${title} ${summary}`)
        });
      }

      return results;
    }

    function normalizeRss2JsonItems(items = []) {
      return items.slice(0, 12).map((item, index) => {
        const title = String(item.title || '').trim();
        const link = String(item.link || SITE_URL).trim();
        const summary = htmlToText(item.description || item.content || item.contentSnippet || '');
        return {
          id: `${Date.now()}-json-${index}`,
          title: title || 'Untitled',
          link,
          summary: summary || '暂无正文摘要。',
          thumbnail: item.thumbnail || 'https://images.unsplash.com/photo-1640340434855-6084b1f4901c?auto=format&fit=crop&w=1200&q=80',
          recommend: recommendCoin(`${title} ${summary}`)
        };
      });
    }

    async function fetchFeedXml() {
      let lastError;
      for (const url of SOURCE_URLS) {
        try {
          const resp = await fetch(url, { cache: 'no-store' });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const text = await resp.text();
          if (!text || text.length < 120) throw new Error('RSS 返回内容为空');
          return text;
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError || new Error('RSS 获取失败');
    }

    async function fetchTextViaProxy(url) {
      const requests = [
        url,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`
      ];

      for (const reqUrl of requests) {
        try {
          const resp = await fetch(reqUrl, { cache: 'no-store' });
          if (!resp.ok) continue;
          if (reqUrl.includes('/get?url=')) {
            const payload = await resp.json();
            const content = payload?.contents || '';
            if (content.length > 120) return content;
          } else {
            const text = await resp.text();
            if (text.length > 120) return text;
          }
        } catch (_) {
          // try next
        }
      }
      throw new Error(`无法抓取: ${url}`);
    }

    async function fetchNewsItems() {
      for (const source of SOURCE_URLS) {
        try {
          const text = await fetchTextViaProxy(source);

          try {
            const parsedXml = extractNewsFromFeed(text, source);
            if (parsedXml.length) return { news: parsedXml, source: `xml:${source}` };
          } catch (_) {
            // not xml
          }

          const parsedHtml = extractNewsFromHtml(text, source);
          if (parsedHtml.length) return { news: parsedHtml, source: `html:${source}` };
        } catch (_) {
          // try next source
        }
      }

      try {
        const FEED_RSS2JSON_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(FEED_URL)}&count=12`;
        const resp = await fetch(FEED_RSS2JSON_URL, { cache: 'no-store' });
        if (resp.ok) {
          const payload = await resp.json();
          const items = Array.isArray(payload?.items) ? payload.items : [];
          const parsed = normalizeRss2JsonItems(items);
          if (parsed.length) return { news: parsed, source: 'rss2json' };
        }
      } catch (_) {
        // continue fallback chain
      }

      const fallback = FALLBACK_NEWS.map((item, index) => ({
        id: `${Date.now()}-fallback-${index}`,
        title: item.title,
        link: item.link,
        summary: item.summary,
        thumbnail: item.thumbnail,
        recommend: recommendCoin(`${item.title} ${item.summary}`)
      }));
      return { news: fallback, source: 'local-fallback' };
    }

    async function fetchBinanceMarkets() {
      try {
        const resp = await fetch(BINANCE_TICKER_24H, { cache: 'no-store' });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const rows = await resp.json();
        if (!Array.isArray(rows) || !rows.length) throw new Error('Binance 返回为空');

        const map = new Map();
        for (const row of rows) {
          const rawSymbol = String(row?.symbol || '');
          const base = baseSymbol(rawSymbol);
          const sym = normalizeSymbol(rawSymbol);
          if (!base && !sym) continue;

          const metric = {
            price: toNumber(row?.lastPrice),
            priceChange24h: toNumber(row?.priceChangePercent),
            volumeUsd24h: toNumber(row?.quoteVolume),
            high24h: toNumber(row?.highPrice),
            low24h: toNumber(row?.lowPrice)
          };

          const keys = new Set([base, sym, `${base}USDT`]);
          for (const k of keys) {
            if (k) map.set(k, metric);
          }
        }

        marketStatus = { ok: true, message: `Binance 已加载 ${map.size} 个币种` };
        return map;
      } catch (error) {
        marketStatus = { ok: false, message: `Binance 行情获取失败（${error.message || 'unknown'}）` };
        return new Map();
      }
    }

    function buildAiAnalysis(newsItem, metrics) {
      const change = metrics?.priceChange24h;
      const volume = metrics?.volumeUsd24h;
      const high = metrics?.high24h;
      const low = metrics?.low24h;

      const tone = Number.isFinite(change)
        ? (change >= 2 ? '短线偏强' : change <= -2 ? '波动偏弱' : '震荡中性')
        : '信号中性';

      const rangeDesc = Number.isFinite(high) && Number.isFinite(low)
        ? `24h 区间在 ${formatPrice(low)} - ${formatPrice(high)} 之间`
        : '24h 高低区间暂不可用';

      return `${newsItem.recommend} 当前 ${tone}。结合新闻事件与衍生品数据，` +
        `${rangeDesc}。` +
        `${Number.isFinite(volume) ? `24h 成交约 ${formatNumber(volume)}。` : '建议等待更多数据确认。'}`;
    }

    function metricCell(label, value, strongClass = '') {
      return `
        <div class="rounded-xl bg-[#eceef0] px-2 py-2.5 text-center">
          <p class="text-[10px] text-[#6b7280] font-semibold">${label}</p>
          <p class="text-[20px] leading-none font-bold mt-1 text-[#2b2f36] ${strongClass}">${value}</p>
        </div>
      `;
    }

    function applyTradeTabStyle(side) {
      const isBuy = side === 'buy';
      tabBuyEl.className = isBuy
        ? 'flex-1 py-3.5 rounded-xl font-headline font-extrabold text-sm transition-all duration-200 bg-emerald-500 text-white shadow-sm'
        : 'flex-1 py-3.5 rounded-xl font-headline font-bold text-sm text-emerald-600 hover:text-emerald-700 transition-all';
      tabSellEl.className = !isBuy
        ? 'flex-1 py-3.5 rounded-xl font-headline font-extrabold text-sm transition-all duration-200 bg-rose-500 text-white'
        : 'flex-1 py-3.5 rounded-xl font-headline font-bold text-sm text-rose-600 hover:text-rose-700 transition-all';
    }

    function applyTradeState() {
      const pair = `${currentTrade.symbol}/USDT`;
      const sideLabel = currentTrade.side === 'buy' ? 'Buy' : 'Sell';
      const cleanPrice = String(currentTrade.price || '--').replace('$', '');
      const changeNum = Number(String(currentTrade.change).replace('%', ''));

      tradePairEl.textContent = pair;
      tradeLastPriceEl.className = Number.isFinite(changeNum)
        ? `font-bold text-lg tracking-tight ${changeNum >= 0 ? 'text-emerald-700' : 'text-error'}`
        : 'font-bold text-on-surface-variant text-lg tracking-tight';
      tradeLastPriceEl.textContent = cleanPrice;
      tradeChangeBadgeEl.className = Number.isFinite(changeNum)
        ? (changeNum >= 0
          ? 'text-emerald-700 text-xs font-semibold px-1.5 py-0.5 bg-emerald-100 rounded'
          : 'text-error text-xs font-semibold px-1.5 py-0.5 bg-error-container/10 rounded')
        : 'text-on-surface-variant text-xs font-semibold px-1.5 py-0.5 bg-surface-container-low rounded';
      tradeChangeBadgeEl.textContent = currentTrade.change;
      tradePriceInputEl.value = cleanPrice;
      tradeAmountInputEl.placeholder = `Min 10 ${currentTrade.symbol}`;
      tradeAmountUnitEl.textContent = currentTrade.symbol;
      tradeFeeEl.textContent = `0.1 ${currentTrade.symbol}`;
      tradeSubmitBtnEl.textContent = `${sideLabel} ${currentTrade.symbol}`;
      tradeSubmitBtnEl.className = currentTrade.side === 'buy'
        ? 'w-full py-4 bg-emerald-500 text-white rounded-2xl font-headline font-extrabold text-lg shadow-[0_12px_24px_-8px_rgba(16,185,129,0.45)] active:scale-[0.98] transition-all'
        : 'w-full py-4 bg-rose-500 text-white rounded-2xl font-headline font-extrabold text-lg shadow-[0_12px_24px_-8px_rgba(244,63,94,0.4)] active:scale-[0.98] transition-all';
      tradeHintEl.innerHTML = currentTrade.side === 'buy'
        ? 'Switch to <span class="text-rose-400">Sell Tab</span> for dynamic controls'
        : 'Switch to <span class="text-emerald-500">Buy Tab</span> for dynamic controls';
      applyTradeTabStyle(currentTrade.side);
    }

    function openTradeModal({ side, symbol, price, change }) {
      currentTrade = {
        side: side === 'sell' ? 'sell' : 'buy',
        symbol: baseSymbol(symbol || 'BTC') || 'BTC',
        price: price || '--',
        change: change || '--'
      };
      applyTradeState();
      tradeModalEl.classList.add('open');
      document.body.classList.add('overflow-hidden');
    }

    function closeTradeModal() {
      tradeModalEl.classList.remove('open');
      document.body.classList.remove('overflow-hidden');
    }

    function createNewsCard(newsItem) {
      const card = document.createElement('article');
      card.className = 'rounded-3xl border border-gray-200 bg-white p-4 shadow-sm';
      const normalizedRecommend = normalizeSymbol(newsItem.recommend);
      const metric =
        marketMap.get(normalizedRecommend) ||
        marketMap.get(baseSymbol(normalizedRecommend)) ||
        marketMap.get(`${baseSymbol(normalizedRecommend)}USDT`) ||
        null;
      const priceValue = Number.isFinite(metric?.price) ? `$${formatPrice(metric.price)}` : '--';
      const changeValue = formatPercent(metric?.priceChange24h);
      const isUp = Number(metric?.priceChange24h) >= 0;
      const trendClass = Number.isFinite(metric?.priceChange24h)
        ? (isUp ? 'text-emerald-600' : 'text-rose-600')
        : 'text-gray-500';
      const trendLabel = Number.isFinite(metric?.priceChange24h)
        ? (isUp ? '利多' : '利空')
        : '中性';
      const trendBadgeClass = Number.isFinite(metric?.priceChange24h)
        ? (isUp ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white')
        : 'bg-gray-300 text-gray-700';
      const detailsChangeClass = Number.isFinite(metric?.priceChange24h)
        ? (Number(metric.priceChange24h) >= 0 ? 'text-emerald-600' : 'text-rose-600')
        : '';
      const recommendSide = Number.isFinite(metric?.priceChange24h)
        ? (Number(metric.priceChange24h) >= 0 ? 'buy' : 'sell')
        : 'buy';
      const actionLabel = recommendSide === 'buy' ? '买入' : '卖出';
      const actionClass = recommendSide === 'buy'
        ? 'bg-emerald-500 text-white'
        : 'bg-rose-500 text-white';
      const actionIcon = recommendSide === 'buy' ? 'shopping_cart' : 'trending_down';
      const metricsHtml = [
        metricCell('24h涨跌', changeValue, detailsChangeClass),
        metricCell('24h最高', metric && Number.isFinite(metric.high24h) ? `$${formatPrice(metric.high24h)}` : '--'),
        metricCell('24h最低', metric && Number.isFinite(metric.low24h) ? `$${formatPrice(metric.low24h)}` : '--'),
        metricCell('24h成交额', metric ? `$${formatNumber(metric.volumeUsd24h)}` : '--')
      ].join('');

      card.innerHTML = `
        <div class="min-w-0">
          <h2 class="font-headline font-extrabold text-[17px] leading-tight text-[#1f2937]">${newsItem.title}</h2>
          <p class="text-[13px] text-gray-600 mt-2 leading-relaxed summary summary-clamp">${newsItem.summary}</p>
          <button class="toggleSummary mt-2 text-xs font-semibold text-primary">查看全部</button>
          <img src="${newsItem.thumbnail}" alt="新闻缩略图" class="w-full mt-3 rounded-2xl object-cover border border-gray-100 aspect-[16/9]" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1640340434855-6084b1f4901c?auto=format&fit=crop&w=1200&q=80'" />
        </div>

        <button class="recommendTrigger mt-4 w-full bg-surface-container-low rounded-2xl p-3.5 flex items-center justify-between text-left">
          <div class="flex items-center gap-2.5">
            <span class="px-1.5 py-0.5 rounded text-[10px] font-bold ${trendBadgeClass}">${trendLabel}</span>
            <div class="w-8 h-8 rounded-full bg-white border border-gray-200 flex items-center justify-center">
              <span class="material-symbols-outlined text-[16px] text-[#d28b00]" style="font-variation-settings:'FILL' 1">currency_bitcoin</span>
            </div>
            <p class="text-sm font-semibold text-[#1f2937]">${newsItem.recommend}</p>
          </div>
          <div class="text-right">
            <p class="text-[22px] leading-none font-bold text-[#111827]">${priceValue}</p>
            <p class="text-xs mt-1 font-semibold ${trendClass}">${changeValue}</p>
          </div>
        </button>

        <div class="expandPanel hidden">
          <div class="mt-4 rounded-2xl border border-[#e4dcc0] bg-[#f2f1ea] p-3.5">
            <div class="w-full flex items-center justify-between text-left">
              <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-[15px] text-[#7a5d00]" style="font-variation-settings:'FILL' 1">smart_toy</span>
                <p class="text-[10px] font-extrabold tracking-[0.18em] text-[#7a5d00] uppercase">AINSIGHT</p>
              </div>
            </div>

            <div class="ai-details open mt-3 border-t border-[#ddd6ba] pt-3">
              <p class="aiText text-[13px] text-[#5b4b12] leading-relaxed">AI 分析加载中...</p>
            </div>
          </div>

          <div class="metrics grid grid-cols-4 gap-2 mt-4">${metricsHtml}</div>

          <div class="mt-4">
            <button class="actionBtn w-full py-3 ${actionClass} font-headline font-extrabold rounded-2xl active:scale-95 transition-transform flex items-center justify-center gap-2">
              <span class="material-symbols-outlined text-[18px]" style="font-variation-settings:'FILL' 1">${actionIcon}</span>
              ${actionLabel}
            </button>
          </div>
        </div>
      `;

      const summaryEl = card.querySelector('.summary');
      const toggleSummaryBtn = card.querySelector('.toggleSummary');
      const recommendTriggerEl = card.querySelector('.recommendTrigger');
      const expandPanelEl = card.querySelector('.expandPanel');
      const aiTextEl = card.querySelector('.aiText');
      const actionBtnEl = card.querySelector('.actionBtn');

      let summaryExpanded = false;
      let aiLoaded = false;

      toggleSummaryBtn.addEventListener('click', () => {
        summaryExpanded = !summaryExpanded;
        summaryEl.classList.toggle('summary-clamp', !summaryExpanded);
        toggleSummaryBtn.textContent = summaryExpanded ? '收起' : '查看全部';
      });

      recommendTriggerEl.addEventListener('click', async () => {
        const isHidden = expandPanelEl.classList.contains('hidden');
        if (!isHidden) {
          expandPanelEl.classList.add('hidden');
          return;
        }

        expandPanelEl.classList.remove('hidden');
        if (aiLoaded) return;

        aiTextEl.textContent = buildAiAnalysis(newsItem, metric);
        aiLoaded = true;
      });

      actionBtnEl.addEventListener('click', () => {
        openTradeModal({
          side: recommendSide,
          symbol: newsItem.recommend,
          price: priceValue,
          change: changeValue
        });
      });

      return card;
    }

    function renderNews(news) {
      newsListEl.innerHTML = '';
      if (!news.length) {
        newsListEl.innerHTML = '<p class="text-sm text-gray-500 text-center py-10">暂无可展示新闻</p>';
        return;
      }

      news.forEach((item) => newsListEl.appendChild(createNewsCard(item)));
    }

    async function loadPageData() {
      if (refreshBtn) refreshBtn.disabled = true;
      if (feedStatusEl) feedStatusEl.textContent = '正在同步 ChainCatcher 新闻与 Binance 行情...';

      try {
        const [{ news, source }, market] = await Promise.all([
          fetchNewsItems(),
          fetchBinanceMarkets()
        ]);

        marketMap = market;
        renderNews(news);

        const marketHint = marketStatus.message;

        if (feedStatusEl) feedStatusEl.textContent = `已加载 ${news.length} 条新闻（来源: ${source}）。${marketHint}`;
      } catch (err) {
        console.error(err);
        const fallback = FALLBACK_NEWS.map((item, index) => ({
          id: `${Date.now()}-hardfallback-${index}`,
          title: item.title,
          link: item.link,
          summary: item.summary,
          thumbnail: item.thumbnail,
          recommend: recommendCoin(`${item.title} ${item.summary}`)
        }));
        renderNews(fallback);
        if (feedStatusEl) feedStatusEl.textContent = `Feed 拉取失败，已显示本地备用新闻。错误: ${err.message || '未知错误'}`;
      } finally {
        if (refreshBtn) refreshBtn.disabled = false;
      }
    }

    if (refreshBtn) refreshBtn.addEventListener('click', loadPageData);
    tradeBackdropEl.addEventListener('click', closeTradeModal);
    tradeCloseBtnEl.addEventListener('click', closeTradeModal);
    tabBuyEl.addEventListener('click', () => {
      currentTrade.side = 'buy';
      applyTradeState();
    });
    tabSellEl.addEventListener('click', () => {
      currentTrade.side = 'sell';
      applyTradeState();
    });
    tradeSubmitBtnEl.addEventListener('click', () => {
      closeTradeModal();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && tradeModalEl.classList.contains('open')) {
        closeTradeModal();
      }
    });
    loadPageData();
  </script>
</body>
</html>
