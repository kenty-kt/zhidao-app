<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI助手</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Inter", sans-serif; }
    .font-headline { font-family: "Manrope", sans-serif; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24; }
    .status-bar-safe { padding-top: env(safe-area-inset-top); }
    .bottom-safe { padding-bottom: env(safe-area-inset-bottom); }
    .tag-chip.active { border-color: #ffffff; box-shadow: 0 0 0 2px rgba(255,255,255,0.15); }
  </style>
</head>
<body class="bg-[#f5f6f7] text-[#2c2f30] min-h-screen">
  <main class="status-bar-safe min-h-screen flex flex-col">
    <section class="flex-1 flex flex-col items-center justify-center px-4 pt-10 pb-8">
      <div class="w-24 h-24 rounded-full bg-gradient-to-br from-sky-200 via-indigo-200 to-purple-200 p-1.5 shadow-[0_0_36px_rgba(255,255,255,0.2)]">
        <div class="w-full h-full rounded-full bg-[#0f172a] flex items-center justify-center text-5xl">🤖</div>
      </div>

      <h1 class="mt-8 text-3xl md:text-5xl font-headline font-extrabold tracking-tight text-[#1f2329] text-center">你好~ 我什么都知道</h1>
      <p class="mt-3 text-base md:text-xl text-[#4b5563] font-semibold text-center">您的行情助手，随时为您解答加密货币相关问题</p>

      <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
        <button class="tag-chip active inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-2 text-sm md:text-lg font-semibold text-[#323843] border border-gray-200">
          <span class="text-red-500">🔥</span>热门趋势
        </button>
        <button class="tag-chip inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-2 text-sm md:text-lg font-semibold text-[#323843] border border-gray-200"><span class="text-amber-500">🪙</span>加密货币</button>
        <button class="tag-chip inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-2 text-sm md:text-lg font-semibold text-[#323843] border border-gray-200"><span class="text-blue-500">🌎</span>宏观</button>
        <button class="tag-chip inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-2 text-sm md:text-lg font-semibold text-[#323843] border border-gray-200"><span class="text-rose-400">♡</span>市场情绪</button>
        <button class="tag-chip inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-2 text-sm md:text-lg font-semibold text-[#323843] border border-gray-200"><span class="text-violet-500">⛓</span>工作链</button>
        <button class="tag-chip inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-2 text-sm md:text-lg font-semibold text-[#323843] border border-gray-200"><span class="text-indigo-500">🧭</span>预测市场</button>
        <button class="tag-chip inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-2 text-sm md:text-lg font-semibold text-[#323843] border border-gray-200"><span class="text-emerald-500">✧</span>学习</button>
      </div>

      <div id="suggestionWrap" class="mt-10 max-w-[1450px] flex flex-wrap items-center justify-center gap-3">
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">大饼链上巨鲸最新动向</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">ETH近4个小时走势</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">本周市场热点解读</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">全球稳定币最新政策</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">NFT市场近期回暖迹象</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">DeFi项目新趋势分析</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">数字货币安全性提升新方案</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">区块链技术未来发展预测</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">SOL近4个小时走势</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">BTC近4个小时走势</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">区块链最新利率决议及影响</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">ETH近4个小时走势</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">加密市场最新技术分析</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">NFT市场现状与未来趋势</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">大饼链上鲸最新动向</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">ETH近4个小时走势</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">本周市场热点解读</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">全球稳定币最新政策</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">NFT市场近期趋势分析</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">DeFi项目投资机会探讨</button>
        <button class="suggest-chip rounded-full bg-white px-4 py-2 text-sm md:text-base text-[#3c4148]">区块链技术未来发展方向</button>
      </div>
    </section>

    <footer class="bottom-safe fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 z-50">
      <!-- 底部导航栏已注释 -->
      <div class="w-full max-w-md mx-auto px-4 pb-4 pt-3">
        <div class="flex items-center justify-between gap-3">
          <a href="news.html" class="w-12 h-12 flex-shrink-0 border border-gray-200 rounded-2xl flex items-center justify-center bg-white shadow-sm">
            <span class="text-[10px] font-black text-gray-500">资讯</span>
          </a>
          <div class="flex-grow h-12 bg-gray-50 rounded-2xl border border-gray-200 px-4 flex items-center gap-3">
            <span class="material-symbols-outlined text-[#8a6d00] text-xl">mic</span>
            <input id="chatInput" class="flex-grow text-sm border-none focus:ring-0 p-0 text-gray-700 bg-transparent placeholder:text-gray-400" placeholder="问问就知道" type="text" />
          </div>
          <a href="trade.html" class="w-12 h-12 flex-shrink-0 border border-gray-200 rounded-2xl flex items-center justify-center bg-white shadow-sm">
            <span class="text-[10px] font-black text-gray-500">行情</span>
          </a>
        </div>
        <p class="text-[9px] text-gray-400 mt-2 text-center">内容由AI生成，不构成投资建议</p>
      </div>
    </footer>
  </main>

  <script>
    const tagChips = Array.from(document.querySelectorAll(".tag-chip"));
    const suggestChips = Array.from(document.querySelectorAll(".suggest-chip"));
    const chatInput = document.getElementById("chatInput");

    tagChips.forEach((btn) => {
      btn.addEventListener("click", () => {
        tagChips.forEach((x) => x.classList.remove("active"));
        btn.classList.add("active");
      });
    });

    suggestChips.forEach((btn) => {
      btn.addEventListener("click", () => {
        const text = btn.textContent.trim();
        localStorage.setItem("zhidao_ai_last_prompt", text);
        window.location.href = "ai-chat-examples.html";
      });
    });

    function submit() {
      const text = (chatInput.value || "").trim();
      if (!text) return;
      localStorage.setItem("zhidao_ai_last_prompt", text);
      window.location.href = "ai-chat-examples.html";
    }

    if (chatInput) {
      chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          submit();
        }
      });
    }
  </script>
</body>
</html>
