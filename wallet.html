<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>钱包 - ZhiDao AI</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Inter", sans-serif; }
    .font-headline { font-family: "Manrope", sans-serif; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24; }
    .status-bar-safe { padding-top: env(safe-area-inset-top); }
    .bottom-nav-safe { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body class="bg-[#f5f6f7] text-[#2c2f30] min-h-screen pb-44">
  <header class="status-bar-safe sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-gray-100">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="w-8"></div>
      <div class="text-center">
        <p class="font-headline font-extrabold tracking-tight">钱包</p>
        <p class="text-[11px] text-gray-400">Turnkey Embedded</p>
      </div>
      <a href="wallet.html" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-100 text-gray-700 text-xs font-semibold">
        <span class="material-symbols-outlined text-[18px]">account_balance_wallet</span>
        <span>1,280.45 USDT</span>
      </a>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-4 pb-32 space-y-3">

    <section class="bg-white border border-gray-100 rounded-2xl shadow-sm overflow-hidden">
      <div class="px-4 py-3 border-b border-gray-100 bg-gray-50/80">
        <p class="font-headline font-bold text-sm">Turnkey 操作面板</p>
        <p class="text-xs text-gray-500 mt-1">直接在本页执行常用钱包操作（通过你的后端代理接口）。</p>
      </div>
      <div class="p-4 space-y-4">
        <div class="grid md:grid-cols-2 gap-3">
          <label class="block">
            <span class="text-xs text-gray-500">后端代理 URL</span>
            <input id="proxyBaseUrlInput" type="text" class="mt-1 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-2 text-sm" placeholder="http://localhost:8787" value="http://localhost:8787" />
          </label>
          <label class="block">
            <span class="text-xs text-gray-500">用户标识（可选）</span>
            <input id="userTagInput" type="text" class="mt-1 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-2 text-sm" placeholder="user_001" />
          </label>
        </div>

        <div class="grid md:grid-cols-2 gap-3">
          <button id="whoamiBtn" class="rounded-xl border border-gray-200 px-4 py-2 text-sm font-semibold bg-white hover:bg-gray-50">查询 WhoAmI</button>
          <button id="listWalletsBtn" class="rounded-xl border border-gray-200 px-4 py-2 text-sm font-semibold bg-white hover:bg-gray-50">获取钱包列表</button>
          <button id="createWalletBtn" class="rounded-xl border border-gray-200 px-4 py-2 text-sm font-semibold bg-white hover:bg-gray-50">创建钱包</button>
          <button id="copyCurlBtn" class="rounded-xl border border-gray-200 px-4 py-2 text-sm font-semibold bg-white hover:bg-gray-50">复制示例 cURL</button>
        </div>

        <div class="grid md:grid-cols-2 gap-3">
          <label class="block">
            <span class="text-xs text-gray-500">签名消息</span>
            <input id="signMessageInput" type="text" class="mt-1 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-2 text-sm" placeholder="hello turnkey" />
          </label>
          <label class="block">
            <span class="text-xs text-gray-500">钱包地址（用于签名）</span>
            <input id="walletAddressInput" type="text" class="mt-1 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-2 text-sm" placeholder="0x..." />
          </label>
        </div>
        <button id="signMessageBtn" class="w-full rounded-xl bg-[#FFD308] px-4 py-2.5 text-sm font-bold text-[#5a4900]">签名消息</button>

        <div class="grid md:grid-cols-3 gap-3">
          <label class="block">
            <span class="text-xs text-gray-500">转账目标地址</span>
            <input id="toAddressInput" type="text" class="mt-1 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-2 text-sm" placeholder="0x..." />
          </label>
          <label class="block">
            <span class="text-xs text-gray-500">数量</span>
            <input id="amountInput" type="text" class="mt-1 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-2 text-sm" placeholder="0.01" />
          </label>
          <label class="block">
            <span class="text-xs text-gray-500">链（示例）</span>
            <input id="chainInput" type="text" class="mt-1 w-full rounded-xl border border-gray-200 bg-gray-50 px-3 py-2 text-sm" placeholder="ethereum-sepolia" />
          </label>
        </div>
        <button id="sendTxBtn" class="w-full rounded-xl bg-black px-4 py-2.5 text-sm font-bold text-white">发起转账</button>

        <div class="rounded-xl border border-gray-200 bg-gray-50 p-3">
          <p class="text-xs text-gray-500 mb-2">执行日志</p>
          <pre id="operationLog" class="text-[11px] leading-5 text-gray-700 whitespace-pre-wrap">等待操作...</pre>
        </div>
      </div>
    </section>
  </main>

  <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 bottom-nav-safe z-50">
    <!-- 底部导航栏已注释 -->
    <div class="w-full max-w-md mx-auto px-4 pb-4 pt-3">
      <div class="flex items-center justify-between gap-3">
        <a href="news.html" class="w-12 h-12 flex-shrink-0 border border-gray-200 rounded-2xl flex items-center justify-center bg-white shadow-sm">
          <span class="text-[10px] font-black text-gray-500">资讯</span>
        </a>
        <div id="openAiAssistantInput" class="flex-grow h-12 bg-gray-50 rounded-2xl border border-gray-200 px-4 flex items-center gap-3 cursor-pointer">
          <span class="material-symbols-outlined text-[#8a6d00] text-xl">mic</span>
          <input id="aiAssistantInput" class="flex-grow text-sm border-none focus:ring-0 p-0 text-gray-700 bg-transparent placeholder:text-gray-400 cursor-pointer" placeholder="提问或搜索" type="text" readonly />
        </div>
        <a href="trade.html" class="w-12 h-12 flex-shrink-0 border border-gray-200 rounded-2xl flex items-center justify-center bg-white shadow-sm">
          <span class="text-[10px] font-black text-gray-500">行情</span>
        </a>
      </div>
      <p class="text-[9px] text-gray-400 mt-2 text-center">内容由AI生成，不构成投资建议</p>
    </div>
  </div>

  <script>
    const openAiAssistantInputEl = document.getElementById("openAiAssistantInput");
    const aiAssistantInputEl = document.getElementById("aiAssistantInput");
    const proxyBaseUrlInputEl = document.getElementById("proxyBaseUrlInput");
    const userTagInputEl = document.getElementById("userTagInput");
    const whoamiBtnEl = document.getElementById("whoamiBtn");
    const listWalletsBtnEl = document.getElementById("listWalletsBtn");
    const createWalletBtnEl = document.getElementById("createWalletBtn");
    const copyCurlBtnEl = document.getElementById("copyCurlBtn");
    const signMessageBtnEl = document.getElementById("signMessageBtn");
    const sendTxBtnEl = document.getElementById("sendTxBtn");
    const signMessageInputEl = document.getElementById("signMessageInput");
    const walletAddressInputEl = document.getElementById("walletAddressInput");
    const toAddressInputEl = document.getElementById("toAddressInput");
    const amountInputEl = document.getElementById("amountInput");
    const chainInputEl = document.getElementById("chainInput");
    const operationLogEl = document.getElementById("operationLog");

    function appendLog(title, payload) {
      if (!operationLogEl) return;
      const now = new Date().toLocaleTimeString();
      const body = typeof payload === "string" ? payload : JSON.stringify(payload, null, 2);
      operationLogEl.textContent = `[${now}] ${title}\n${body}\n\n` + operationLogEl.textContent;
    }

    async function postToProxy(path, body) {
      const base = (proxyBaseUrlInputEl?.value || "").trim().replace(/\/$/, "");
      if (!base) {
        appendLog("错误", "请先填写后端代理 URL");
        return;
      }
      const url = `${base}${path}`;
      appendLog("请求", { url, body });
      try {
        const resp = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const text = await resp.text();
        let json;
        try { json = JSON.parse(text); } catch (_) { json = text; }
        appendLog("响应", { status: resp.status, data: json });
      } catch (err) {
        appendLog("请求失败", err?.message || "网络错误");
      }
    }

    function getBasePayload() {
      return {
        userTag: (userTagInputEl?.value || "").trim()
      };
    }
    if (openAiAssistantInputEl) {
      openAiAssistantInputEl.addEventListener("click", () => {
        window.location.href = "ai-chat.html";
      });
    }
    if (aiAssistantInputEl) {
      aiAssistantInputEl.addEventListener("focus", () => {
        window.location.href = "ai-chat.html";
      });
    }
    if (whoamiBtnEl) {
      whoamiBtnEl.addEventListener("click", () => {
        postToProxy("/turnkey/whoami", getBasePayload());
      });
    }
    if (listWalletsBtnEl) {
      listWalletsBtnEl.addEventListener("click", () => {
        postToProxy("/turnkey/wallets/list", getBasePayload());
      });
    }
    if (createWalletBtnEl) {
      createWalletBtnEl.addEventListener("click", () => {
        postToProxy("/turnkey/wallets/create", {
          ...getBasePayload(),
          walletName: "ZhiDao Primary Wallet"
        });
      });
    }
    if (signMessageBtnEl) {
      signMessageBtnEl.addEventListener("click", () => {
        postToProxy("/turnkey/sign-message", {
          ...getBasePayload(),
          walletAddress: (walletAddressInputEl?.value || "").trim(),
          message: (signMessageInputEl?.value || "").trim() || "hello turnkey"
        });
      });
    }
    if (sendTxBtnEl) {
      sendTxBtnEl.addEventListener("click", () => {
        postToProxy("/turnkey/send-transaction", {
          ...getBasePayload(),
          fromAddress: (walletAddressInputEl?.value || "").trim(),
          toAddress: (toAddressInputEl?.value || "").trim(),
          amount: (amountInputEl?.value || "").trim(),
          chain: (chainInputEl?.value || "").trim() || "ethereum-sepolia"
        });
      });
    }
    if (copyCurlBtnEl) {
      copyCurlBtnEl.addEventListener("click", async () => {
        const base = (proxyBaseUrlInputEl?.value || "https://your-api.com").trim().replace(/\/$/, "");
        const sample = `curl -X POST '${base}/turnkey/wallets/list' \\
  -H 'Content-Type: application/json' \\
  -d '${JSON.stringify(getBasePayload())}'`;
        try {
          await navigator.clipboard.writeText(sample);
          appendLog("已复制 cURL", sample);
        } catch (_) {
          appendLog("复制失败", sample);
        }
      });
    }
  </script>
</body>
</html>
